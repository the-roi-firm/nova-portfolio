[build]
  # Next.js static export outputs to /out
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "http://novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com; frame-ancestors 'none'; form-action 'self' https://api.web3forms.com;"
