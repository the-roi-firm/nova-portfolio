[build]
  publish = "."

[[redirects]]
  from = "http://novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.novastyleloungekandy.com/*"
  to   = "https://novastyleloungekandy.com/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
